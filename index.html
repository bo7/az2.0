<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>az2.0 – Zeiterfassung</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #eef2f7;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 48px 40px;
      text-align: center;
      width: 340px;
      box-shadow: 0 4px 32px rgba(30,52,80,0.10);
    }
    .avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      margin: 0 auto 28px;
      display: block;
    }
    h1 {
      font-size: 26px;
      font-weight: 700;
      color: #1e3450;
      margin-bottom: 8px;
    }
    p {
      font-size: 15px;
      color: #667;
      margin-bottom: 32px;
    }
    .badge {
      display: inline-block;
      background: #1e3450;
      color: white;
      padding: 8px 22px;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="avatar" src="designs/pwa/avatar_zimmerer_mann.png" alt="az2.0 Avatar">
    <h1>az2.0</h1>
    <p>Zeiterfassung für Dachdecker &amp; Zimmerer</p>
    <span class="badge">In Entwicklung</span>
  </div>
</body>
</html>
