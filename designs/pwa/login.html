<!DOCTYPE html>

<html class="h-full" lang="de"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: '#1e3a5f',
                        accent: '#f97316',
                        success: '#16a34a',
                        warning: '#f59e0b',
                        danger: '#dc2626',
                        background: '#f8fafc'
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        "headline": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body h-full flex flex-col items-center">
<!-- TopAppBar Execution from JSON: Login Screen context (Supressed Nav, Focus on Brand) -->
<header class="bg-[#1e3a5f] dark:bg-slate-950 text-white dark:text-slate-200 font-sans antialiased docked full-width top-0 shadow-sm flex justify-between items-center px-4 h-16 w-full fixed top-0 z-50">
<div class="flex items-center gap-3">
<!-- Brand Identity from JSON Content -->
<span class="text-xl font-bold text-white tracking-tight">az2.0</span>
<div class="h-4 w-[1px] bg-white/20"></div>
<span class="text-sm font-medium tracking-wide text-slate-200">Zeiterfassung</span>
</div>
<div class="flex items-center">
<span class="material-symbols-outlined text-white/80" data-icon="construction">construction</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-[390px] px-6 pt-24 pb-12 flex flex-col justify-center min-h-screen">
<!-- Hero/Branding Image -->
<div class="mb-8 rounded-xl overflow-hidden shadow-sm aspect-video w-full bg-slate-200">
<img alt="Construction Site" class="w-full h-full object-cover" data-alt="Modern construction site at dawn with silhouettes of cranes against a soft blue and orange sunrise sky, professional atmosphere" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCCsqAgmOBKFIB7_xsZBdIroskX4YwY83Tfu3tij4b_QK8libQc1BBjFCnUTSTBvq0txPhKVtpAIl2KgxuotVLOyljmfiWbop18yI9evGnxW3EY3Zwr2cqQLGRegZSgQKw_r1PoJWtZmGafH93LjHt9zVypKpgm3zp31FrsIiNsNz-gfYzfDZI1SzBL81tTCKw35NBxY9-qceXZH8k0fIiIBk24rHuWGB3s8y72i9hJN5RakJZSqd6NZ1hVjyv-g73HpRJx0cRvb0wZ"/>
</div>
<!-- Login Card -->
<div class="bg-white dark:bg-slate-900 rounded-lg shadow-sm p-8 w-full border border-slate-100 dark:border-slate-800">
<h1 class="text-2xl font-bold text-primary dark:text-white mb-8">Anmelden</h1>
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-1.5">
<label class="block text-[11px] font-bold text-slate-500 dark:text-slate-400 tracking-wider" for="email">
                        E-MAIL ADRESSE
                    </label>
<div class="relative">
<input class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border-none rounded-lg focus:ring-2 focus:ring-accent transition-all text-slate-900 dark:text-white" id="email" name="email" placeholder="name@firma.de" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<label class="block text-[11px] font-bold text-slate-500 dark:text-slate-400 tracking-wider" for="password">
                        PASSWORT
                    </label>
<div class="relative">
<input class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border-none rounded-lg focus:ring-2 focus:ring-accent transition-all text-slate-900 dark:text-white" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me Checkbox -->
<div class="flex items-center">
<input class="w-5 h-5 rounded border-slate-300 text-accent focus:ring-accent transition-all cursor-pointer" id="remember" name="remember" type="checkbox"/>
<label class="ml-3 text-sm font-medium text-slate-600 dark:text-slate-300 cursor-pointer" for="remember">
                        Angemeldet bleiben
                    </label>
</div>
<!-- Submit Button -->
<button class="w-full bg-[#f97316] hover:bg-orange-600 text-white font-bold py-4 px-6 rounded-lg shadow-md active:scale-[0.98] transition-all duration-200 mt-2" type="submit">
                    Anmelden
                </button>
</form>
<!-- Forgot Password Link -->
<div class="mt-8 text-center">
<a class="text-sm font-semibold text-[#f97316] hover:text-orange-700 transition-colors" href="#">
                    Passwort vergessen?
                </a>
</div>
</div>
<!-- Support Info -->
<div class="mt-12 text-center">
<p class="text-xs text-slate-400 font-medium">
                Probleme beim Login? Wenden Sie sich an Ihren Bauleiter.
            </p>
</div>
</main>
<!-- Shell Filter: BottomNavBar is suppressed on Login/Transactional screens as per the "Destination Rule" in the prompt instructions -->
</body></html>
