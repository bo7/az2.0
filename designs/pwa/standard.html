<!DOCTYPE html>

<html class="h-full" lang="de"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: {
                            DEFAULT: '#1e3a5f',
                            header: '#1e3a5f'
                        },
                        accent: {
                            DEFAULT: '#f97316',
                            hover: '#ea580c'
                        },
                        success: '#16a34a',
                        warning: '#f59e0b',
                        danger: '#dc2626',
                        background: '#f8fafc'
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        headline: ["Inter", "sans-serif"],
                        body: ["Inter", "sans-serif"],
                        label: ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body { font-family: 'Inter', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-slate-900 h-full flex flex-col overflow-hidden max-w-[390px] mx-auto shadow-2xl relative border-x border-slate-200">
<!-- TopAppBar -->
<header class="bg-slate-900 dark:bg-slate-950 text-white flex items-center justify-between px-4 h-16 w-full shrink-0 border-b border-slate-800 shadow-sm font-sans antialiased">
<div class="flex items-center gap-3">
<button class="hover:bg-slate-800 transition-colors p-1 rounded-full active:opacity-80">
<span class="material-symbols-outlined text-white" data-icon="arrow_back">arrow_back</span>
</button>
<span class="text-lg font-bold text-white">Standard</span>
</div>
<div class="bg-slate-800 px-3 py-1.5 rounded-lg border border-slate-700 active:opacity-80 transition-colors">
<span class="text-orange-500 dark:text-orange-400 font-medium text-sm">24. Mai</span>
</div>
</header>
<!-- Scrollable Content -->
<main class="flex-1 overflow-y-auto p-4 pb-32 space-y-6">
<!-- Time Header Card -->
<div class="bg-white rounded-xl shadow-sm border border-slate-100 p-4 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="bg-orange-50 p-2 rounded-lg">
<span class="material-symbols-outlined text-orange-600" data-icon="schedule">schedule</span>
</div>
<div>
<div class="text-xs text-slate-500 font-medium">Arbeitszeit</div>
<div class="text-sm font-bold text-slate-800">07:00 – 16:00 | Pause 0:30</div>
</div>
</div>
<div class="text-right">
<div class="text-xl font-extrabold text-primary">8,5 h</div>
</div>
</div>
<!-- Section Tätigkeiten -->
<section class="space-y-3">
<div class="flex items-center justify-between">
<h2 class="font-bold text-primary text-base uppercase tracking-wider">Tätigkeiten</h2>
<button class="flex items-center gap-1 bg-primary text-white px-3 py-1 rounded-full text-xs font-bold hover:bg-slate-800 transition-colors active:scale-95">
<span class="material-symbols-outlined text-[16px]" data-icon="add">add</span>
<span>Hinzufügen</span>
</button>
</div>
<!-- Activity Entry Card -->
<div class="relative group">
<!-- Swipe-to-delete visual cue -->
<div class="absolute inset-0 bg-red-100 flex items-center justify-end px-6 rounded-xl -z-10">
<span class="material-symbols-outlined text-red-600" data-icon="delete">delete</span>
</div>
<div class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden transform transition-transform hover:-translate-x-1">
<div class="p-4 space-y-4">
<div class="flex gap-3">
<div class="flex-1">
<label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Beschreibung</label>
<textarea class="w-full border-slate-200 rounded-lg text-sm focus:ring-orange-500 focus:border-orange-500 p-2 h-20 resize-none bg-slate-50" placeholder="Was wurde heute gemacht?">Wände verputzt im 1. OG und Vorbereitung für Estricharbeiten im Treppenhaus.</textarea>
</div>
<div class="w-20 shrink-0">
<label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 text-center">Dauer</label>
<input class="w-full border-slate-200 rounded-lg text-sm text-center font-bold bg-orange-50 text-orange-700 focus:ring-orange-500 py-2" type="text" value="5,5 h"/>
</div>
</div>
<!-- Material List (Expandable) -->
<div class="bg-slate-50 rounded-lg border border-slate-100 overflow-hidden">
<div class="p-2 border-b border-slate-200 flex justify-between items-center bg-slate-100/50">
<span class="text-[11px] font-bold text-slate-600 uppercase flex items-center gap-1">
<span class="material-symbols-outlined text-sm" data-icon="construction">construction</span>
                                    Material
                                </span>
<button class="text-orange-600 hover:text-orange-700 font-bold text-xs flex items-center gap-1 transition-colors">
<span class="material-symbols-outlined text-sm" data-icon="add_circle">add_circle</span>
                                    Hinzufügen
                                </button>
</div>
<!-- Material Item -->
<div class="p-3 space-y-2">
<div class="flex items-center gap-2">
<input class="flex-1 text-xs border-slate-200 rounded py-1 px-2" type="text" value="Mörtel"/>
<input class="w-12 text-xs border-slate-200 rounded py-1 px-2 text-center" type="number" value="5"/>
<span class="text-[10px] font-medium text-slate-500 w-10">Sack</span>
<button class="text-slate-300 hover:text-red-500 transition-colors">
<span class="material-symbols-outlined text-lg" data-icon="cancel">cancel</span>
</button>
</div>
<div class="flex items-center gap-2">
<input class="flex-1 text-xs border-slate-200 rounded py-1 px-2" type="text" value="Kalksandstein"/>
<input class="w-12 text-xs border-slate-200 rounded py-1 px-2 text-center" type="number" value="1"/>
<span class="text-[10px] font-medium text-slate-500 w-10">Palette</span>
<button class="text-slate-300 hover:text-red-500 transition-colors">
<span class="material-symbols-outlined text-lg" data-icon="cancel">cancel</span>
</button>
</div>
</div>
</div>
</div>
</div>
</div>
</section>
<!-- Section Zulagen -->
<section class="space-y-3">
<div class="flex items-center justify-between">
<h2 class="font-bold text-primary text-base uppercase tracking-wider">Zulagen</h2>
<button class="flex items-center gap-1 bg-primary text-white px-3 py-1 rounded-full text-xs font-bold hover:bg-slate-800 transition-colors active:scale-95">
<span class="material-symbols-outlined text-[16px]" data-icon="add">add</span>
<span>Hinzufügen</span>
</button>
</div>
<!-- Allowance Item Card -->
<div class="bg-white border border-slate-200 rounded-xl shadow-sm p-4 flex gap-3 items-end">
<div class="flex-1">
<label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Art der Zulage</label>
<select class="w-full border-slate-200 rounded-lg text-sm bg-slate-50 py-2">
<option>Erschwerte Arbeit (Schmutz)</option>
<option>Höhenzulage</option>
<option>Überstunden 25%</option>
</select>
</div>
<div class="w-20 shrink-0">
<label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 text-center">Einheiten</label>
<div class="flex items-center border border-slate-200 rounded-lg bg-slate-50">
<input class="w-full border-0 bg-transparent text-sm text-center font-bold text-slate-700 py-2 focus:ring-0" type="text" value="8,5"/>
</div>
</div>
<button class="bg-slate-100 text-slate-400 p-2 rounded-lg hover:bg-red-50 hover:text-red-500 transition-colors">
<span class="material-symbols-outlined" data-icon="delete">delete</span>
</button>
</div>
</section>
</main>
<!-- Sticky Bottom Bar -->
<footer class="fixed bottom-0 max-w-[390px] w-full bg-white border-t border-slate-200 shadow-[0_-4px_15px_rgba(0,0,0,0.1)] px-4 py-4 z-50 flex items-center justify-between">
<div class="flex flex-col">
<span class="text-[10px] font-bold text-slate-400 uppercase leading-none mb-1">Gesamtzeit</span>
<span class="text-2xl font-black text-primary leading-none">8,5 h</span>
</div>
<button class="bg-orange-600 hover:bg-orange-700 text-white px-8 py-4 rounded-xl flex items-center gap-2 font-bold shadow-lg shadow-orange-200 active:scale-95 transition-all">
<span class="material-symbols-outlined" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
            Speichern
        </button>
</footer>
<!-- Tab Navigation (Placeholder for Shell Context) -->
<nav class="fixed bottom-0 w-full max-w-[390px] z-40 flex justify-around items-center px-2 py-3 bg-white border-t border-slate-200 hidden">
<!-- Hidden as per shell visibility logic for transactional/focused screen -->
</nav>
</body></html>
